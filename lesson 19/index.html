<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUDIO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Summer <br>Days</h1>
    </header>
    <main>
        <div class="vinyl">
            <img src="img/disk.gif" alt="">
        </div>
        <div class="control">
            <img src="img/next.svg" alt="">
        </div>
    </main>
    <div class="playlist">
        <div class="track">
            <div class="card">
                <img src="img/music1.svg" alt="">
            </div>
            
                <div class="player">
                    <button id="miniPlayBtn1" class="play-circle">▶</button>
                    <audio id="miniAudio1" src="audio/1.mp3"></audio>
                </div>
                <div class="name">
                    <p>The fate of Ofelia</p>
                </div>
            
        </div>
        <div class="track">
            <div class="card">
                <img src="img/music2.svg" alt="">
            </div>
            
                <div class="player">
                    <button id="miniPlayBtn2" class="play-circle">▶</button>
                    <audio id="miniAudio2" src="audio/1.mp3"></audio>
                </div>
                <div class="name">
                    <p>The fate of Ofelia</p>
                </div>
            
        </div>
        <div class="track">
            <div class="card">
                <img src="img/music3.svg" alt="">
            </div>
            
                <div class="player">
                    <button id="miniPlayBtn3" class="play-circle">▶</button>
                    <audio id="miniAudio3" src="audio/1.mp3"></audio>
                </div>
                <div class="name">
                    <p>The fate of Ofelia</p>
                </div>
            
        </div>
        <div class="track">
            <div class="card">
                <img src="img/music4.svg" alt="">
            </div>
            
                <div class="player">
                    <button id="miniPlayBtn4" class="play-circle">▶</button>
                    <audio id="miniAudio4" src="audio/1.mp3"></audio>
                </div>
                <div class="name">
                    <p>The fate of Ofelia</p>
                </div>
            
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
